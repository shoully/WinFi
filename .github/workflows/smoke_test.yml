name: Windows Smoke Test

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  smoke-test:
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure CMake
        run: cmake -B build -S . -DCMAKE_BUILD_TYPE=Release

      - name: Build Project
        run: cmake --build build --config Release

      - name: Verify Executable Exists
        shell: pwsh
        run: |
          if (Test-Path "build/Release/WinFi.exe") {
            Write-Host "Smoke Test PASSED: WinFi.exe built successfully."
          } else {
            Write-Error "Smoke Test FAILED: WinFi.exe not found."
            exit 1
          }
